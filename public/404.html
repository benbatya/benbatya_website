<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Benjamin Batya</title>
    <!--
      Single-Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      GitHub Pages has no server-side SPA rewrite, so a deep link like /experience
      lands here (404.html). This script encodes the requested path into a query
      string and redirects to the app root; index.html decodes it before React mounts.
      pathSegmentsToKeep = 0 because the site is served from the domain root.
    -->
    <script>
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
