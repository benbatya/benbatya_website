    <!--
      SPA redirect for GitHub Pages: a deep-link request (e.g. /experience) 404s on
      Pages, which serves 404.html. That file redirects here with the original path
      encoded in the query string; this snippet restores it before React mounts.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
